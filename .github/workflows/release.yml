name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build-macos:
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        run: npm ci && npm run build

      - name: Build x86_64 binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64 binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p artifacts
          lipo -create \
            target/x86_64-apple-darwin/release/zenith-browser \
            target/aarch64-apple-darwin/release/zenith-browser \
            -output artifacts/zenith-browser-macos-universal
          chmod +x artifacts/zenith-browser-macos-universal
          ls -lh artifacts/

      - name: Upload macOS Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./artifacts/zenith-browser-macos-universal
          asset_name: zenith-browser-macos-universal
          asset_content_type: application/x-mach-binary

  build-linux:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build frontend
        working-directory: ./frontend
        run: npm ci && npm run build

      - name: Build Linux binary
        run: cargo build --release

      - name: Create Linux artifact
        run: |
          mkdir -p artifacts
          cp target/release/zenith-browser artifacts/zenith-browser-linux
          chmod +x artifacts/zenith-browser-linux
          ls -lh artifacts/

      - name: Upload Linux Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./artifacts/zenith-browser-linux
          asset_name: zenith-browser-linux
          asset_content_type: application/x-elf-executable

  build-windows:
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: ./frontend
        run: npm ci && npm run build

      - name: Build Windows binary
        run: cargo build --release

      - name: Create Windows artifact
        run: |
          mkdir artifacts
          copy target\release\zenith-browser.exe artifacts\zenith-browser-windows.exe
          dir artifacts

      - name: Upload Windows Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./artifacts/zenith-browser-windows.exe
          asset_name: zenith-browser-windows.exe
          asset_content_type: application/x-msdownload
