<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        (function() {
            const theme = localStorage.getItem('zenith-theme') || 'zenith-dark';
            document.documentElement.setAttribute('data-theme', theme);
            const isLight = theme.includes('light');
            document.documentElement.style.colorScheme = isLight ? 'light' : 'dark';
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="dark"], [data-theme="zenith-dark"] {
            --bg:       #0d0d11;
            --card:     rgba(255,255,255,0.04);
            --border:   rgba(255,255,255,0.08);
            --accent:   #4b8dff;
            --text:     #f0f0f2;
            --muted:    #6b6b78;
            --hover-bg: rgba(255,255,255,0.07);
            --focus-ring: rgba(75,141,255,0.16);
            --focus-shadow: 0 14px 40px rgba(0,0,0,0.3);
        }
        [data-theme="light"], [data-theme="zenith-light"] {
            --bg:       #f6f7fb;
            --card:     rgba(255,255,255,0.8);
            --border:   rgba(15,23,42,0.12);
            --accent:   #2f6df7;
            --text:     #151826;
            --muted:    #5f6475;
            --hover-bg: rgba(47,109,247,0.09);
            --focus-ring: rgba(47,109,247,0.15);
            --focus-shadow: 0 12px 30px rgba(12,18,38,0.1);
        }
        [data-theme="catppuccin-mocha"] {
            --bg:       #1e1e2e;
            --card:     #181825;
            --border:   #313244;
            --accent:   #89b4fa;
            --text:     #cdd6f4;
            --muted:    #bac2de;
            --hover-bg: #313244;
            --focus-ring: rgba(137, 180, 250, 0.2);
            --focus-shadow: 0 14px 40px rgba(0,0,0,0.5);
        }
        [data-theme="gruvbox-dark"] {
            --bg:       #282828;
            --card:     #1d2021;
            --border:   #3c3836;
            --accent:   #fabd2f;
            --text:     #ebdbb2;
            --muted:    #a89984;
            --hover-bg: #3c3836;
            --focus-ring: rgba(250, 189, 47, 0.2);
            --focus-shadow: 0 14px 40px rgba(0,0,0,0.5);
        }
        [data-theme="github-dark"] {
            --bg:       #0d1117;
            --card:     #161b22;
            --border:   #30363d;
            --accent:   #58a6ff;
            --text:     #c9d1d9;
            --muted:    #8b949e;
            --hover-bg: #21262d;
            --focus-ring: rgba(88, 166, 255, 0.2);
            --focus-shadow: 0 14px 40px rgba(0,0,0,0.5);
        }
        [data-theme="github-light"] {
            --bg:       #ffffff;
            --card:     #f6f8fa;
            --border:   #d0d7de;
            --accent:   #0969da;
            --text:     #24292f;
            --muted:    #57606a;
            --hover-bg: #f3f4f6;
            --focus-ring: rgba(9, 105, 218, 0.1);
            --focus-shadow: 0 12px 30px rgba(0,0,0,0.05);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%; overflow-x: hidden; overflow-y: auto;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        body { display: flex; flex-direction: column; align-items: center; }

        /* Clock */
        .clock-wrap {
            text-align: center; pointer-events: none; margin-bottom: 24px;
        }
        .clock-time { font-size: 3rem; font-weight: 300; letter-spacing: -2px; color: var(--text); opacity: 0.9; }
        .clock-date { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

        /* Main container */
        .container { width: 100%; max-width: 620px; padding: 40px 24px; margin: auto; animation: fadeUp 0.5s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

        /* Logo */
        .logo {
            font-size: 2rem; font-weight: 600; letter-spacing: -1px;
            text-align: center; margin-bottom: 28px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Search */
        .search-box {
            display: flex; align-items: center; gap: 10px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 14px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(12px);
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus-ring), var(--focus-shadow);
        }
        .search-box svg { width: 18px; height: 18px; color: var(--muted); flex-shrink: 0; }
        .search-box input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text); font-size: 1rem; font-family: inherit;
        }
        .search-box input::placeholder { color: var(--muted); }

        /* Shortcuts */
        .shortcuts-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 28px 0 14px; }
        .shortcuts-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .shortcut {
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; cursor: pointer; text-decoration: none;
            padding: 6px 4px; border-radius: 10px; transition: background 0.15s;
        }
        .shortcut:hover { background: var(--hover-bg); }
        .shortcut:hover .s-icon { border-color: var(--accent); transform: translateY(-3px); }
        .s-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: var(--card); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; transition: all 0.2s; overflow: hidden;
        }
        .s-icon img { width: 28px; height: 28px; border-radius: 4px; }
        .s-label { font-size: 12px; font-weight: 500; color: var(--muted); }
        .shortcut:hover .s-label { color: var(--text); }

        /* Recent sites */
        .recents { margin-top: 26px; }
        .recents-grid { display: flex; flex-direction: column; gap: 4px; }
        .recent-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s;
            text-decoration: none;
        }
        .recent-item:hover { background: var(--hover-bg); }
        .recent-favicon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
        .recent-url { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .recent-title { font-size: 13px; color: var(--text); margin-left: auto; flex-shrink: 0; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #bookmarks-section { display: none; }
        #recents-section { display: none; }

        /* Suggestions Dropdown */
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 10px;
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            overflow: hidden;
            display: none;
        }
        .suggestions-dropdown.visible { display: block; }
        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .suggestion-item:hover, .suggestion-item.selected {
            background: var(--hover-bg);
        }
        .sugg-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            opacity: 0.6;
            color: var(--accent);
        }
        .sugg-content {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .sugg-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sugg-url {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sugg-header {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 14px 4px 14px;
        }
    </style>
</head>
<body>



<div class="container">
    <div class="clock-wrap">
        <div class="clock-time" id="clock-time">00:00</div>
        <div class="clock-date" id="clock-date"></div>
    </div>
    <div class="logo">Zenith</div>

    <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search or go to a URL…" autofocus autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div id="suggestions-dropdown" class="suggestions-dropdown"></div>
    </div>

    <div class="shortcuts-label">Quick Links</div>
    <div class="shortcuts-grid" id="shortcuts-grid">
        <div class="shortcut" data-url="https://github.com">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=github.com&sz=64" alt="GitHub" onerror="this.parentElement.textContent='GH'"></div>
            <div class="s-label">GitHub</div>
        </div>
        <div class="shortcut" data-url="https://youtube.com">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=youtube.com&sz=64" alt="YouTube" onerror="this.parentElement.textContent='YT'"></div>
            <div class="s-label">YouTube</div>
        </div>
        <div class="shortcut" data-url="https://reddit.com">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=reddit.com&sz=64" alt="Reddit" onerror="this.parentElement.textContent='RD'"></div>
            <div class="s-label">Reddit</div>
        </div>
        <div class="shortcut" data-url="https://news.ycombinator.com">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=news.ycombinator.com&sz=64" alt="HN" onerror="this.parentElement.textContent='HN'"></div>
            <div class="s-label">Hacker News</div>
        </div>
        <div class="shortcut" data-url="https://x.com">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=x.com&sz=64" alt="X" onerror="this.parentElement.textContent='X'"></div>
            <div class="s-label">X / Twitter</div>
        </div>
        <div class="shortcut" data-url="https://linear.app">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=linear.app&sz=64" alt="Linear" onerror="this.parentElement.textContent='LN'"></div>
            <div class="s-label">Linear</div>
        </div>
        <div class="shortcut" data-url="https://vercel.com">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=vercel.com&sz=64" alt="Vercel" onerror="this.parentElement.textContent='VC'"></div>
            <div class="s-label">Vercel</div>
        </div>
        <div class="shortcut" data-url="https://docs.rs">
            <div class="s-icon"><img src="https://www.google.com/s2/favicons?domain=docs.rs&sz=64" alt="docs.rs" onerror="this.parentElement.textContent='RS'"></div>
            <div class="s-label">docs.rs</div>
        </div>
    </div>

    <div class="recents" id="recents-section">
        <div class="shortcuts-label">Recently Visited</div>
        <div class="recents-grid" id="recents-grid"></div>
    </div>

    <div class="recents" id="bookmarks-section">
        <div class="shortcuts-label">Bookmarks</div>
        <div class="recents-grid" id="bookmarks-grid"></div>
    </div>
</div>

<script>
// ── Clock ─────────────────────────────────────────────────────────────────────
function tick() {
    const now = new Date();
    document.getElementById('clock-time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('clock-date').textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
}
tick(); setInterval(tick, 1000);

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
}
const savedTheme = localStorage.getItem('zenith-theme') || 'zenith-dark';
applyTheme(savedTheme);

function sendToHost(payload) {
    const message = { ...payload };
    if (typeof window.__ZENITH_TAB_ID === 'number') {
        message.tabId = window.__ZENITH_TAB_ID;
    }
    try {
        if (window.ipc && typeof window.ipc.postMessage === 'function') {
            window.ipc.postMessage(JSON.stringify(message));
            return;
        }
    } catch (_) {}
    window.parent.postMessage(payload, '*');
}

// ── Navigate helper ───────────────────────────────────────────────────────────
function go(url) {
    sendToHost({ type: 'navigate', url });
}

// ── Search ────────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const suggestionsDropdown = document.getElementById('suggestions-dropdown');
let currentSuggestions = [];
let selectedSuggestionIndex = -1;

const ICONS = {
    history: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    bookmark: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    tab: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
    search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`
};

function renderSuggestions() {
    if (currentSuggestions.length === 0) {
        suggestionsDropdown.classList.remove('visible');
        return;
    }
    suggestionsDropdown.innerHTML = '';
    let lastSection = null;
    const SECTION_NAMES = { tab: 'Switch to Tab', bookmark: 'Bookmarks', history: 'History' };

    currentSuggestions.forEach((s, idx) => {
        const type = s.suggestionType || s.type;
        if (type !== lastSection) {
            const header = document.createElement('div');
            header.className = 'sugg-header';
            header.innerText = SECTION_NAMES[type] || type;
            suggestionsDropdown.appendChild(header);
            lastSection = type;
        }

        const item = document.createElement('div');
        item.className = 'suggestion-item' + (idx === selectedSuggestionIndex ? ' selected' : '');
        item.innerHTML = `
            <div class="sugg-icon">${ICONS[type] || ICONS.search}</div>
            <div class="sugg-content">
                <span class="sugg-title">${s.title}</span>
                <span class="sugg-url">${s.url || ''}</span>
            </div>
        `;
        item.onclick = () => {
            if (type === 'tab' && s.tabId) {
                sendToHost({ type: 'switch_tab', tabId: s.tabId });
            } else if (s.url) {
                go(s.url);
            }
        };
        suggestionsDropdown.appendChild(item);
    });
    suggestionsDropdown.classList.add('visible');
}

function searchUrlFor(query) {
    const key = localStorage.getItem('zenith-search-engine') || 'google';
    const map = {
        google: (q) => `https://www.google.com/search?igu=1&q=${encodeURIComponent(q)}`,
        duckduckgo: (q) => `https://duckduckgo.com/?q=${encodeURIComponent(q)}`,
        bing: (q) => `https://www.bing.com/search?q=${encodeURIComponent(q)}`
    };
    const fn = map[key] || map.google;
    return fn(query);
}

document.getElementById('search-input').addEventListener('input', e => {
    const rawValue = e.target.value;
    const sanitized = rawValue.replace(/[\x00-\x1F\x7F-\x9F]/g, "");
    
    if (rawValue !== sanitized) {
        const start = e.target.selectionStart;
        const end = e.target.selectionEnd;
        e.target.value = sanitized;
        e.target.setSelectionRange(start, end);
    }

    const q = e.target.value.trim();
    if (q) {
        // Trigger the premium Command Palette in the shell
        sendToHost({ type: 'get_suggestions', query: q });
    } else {
        sendToHost({ type: 'hide_suggestions' });
    }
});

document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.stopPropagation();
    }
    
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedSuggestionIndex = Math.min(selectedSuggestionIndex + 1, currentSuggestions.length - 1);
        renderSuggestions();
        return;
    }
    if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedSuggestionIndex = Math.max(selectedSuggestionIndex - 1, -1);
        renderSuggestions();
        return;
    }
    if (e.key === 'Escape') {
        currentSuggestions = [];
        renderSuggestions();
        return;
    }

    if (e.key !== 'Enter') return;
    
    if (selectedSuggestionIndex >= 0) {
        const s = currentSuggestions[selectedSuggestionIndex];
        const type = s.suggestionType || s.type;
        if (type === 'tab' && s.tabId) {
            sendToHost({ type: 'switch_tab', tabId: s.tabId });
        } else if (s.url) {
            go(s.url);
        }
        return;
    }

    const q = e.target.value.trim();
    if (!q) return;
    const url = (q.includes('.') && !q.includes(' '))
        ? (q.startsWith('http') ? q : 'https://' + q)
        : searchUrlFor(q);
    go(url);
    // Ensure suggestions hide on navigation
    sendToHost({ type: 'hide_suggestions' });
});

// ── Shortcuts ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.shortcut[data-url]').forEach(el => {
    el.addEventListener('click', () => go(el.dataset.url));
});

function hostFromUrl(url) {
    try {
        return new URL(url).hostname;
    } catch (_) {
        return url || '';
    }
}

function renderSiteList(sectionId, gridId, sites) {
    const section = document.getElementById(sectionId);
    const grid = document.getElementById(gridId);
    if (!section || !grid) return;

    if (!Array.isArray(sites) || !sites.length) {
        section.style.display = 'none';
        grid.innerHTML = '';
        return;
    }

    section.style.display = 'block';
    grid.innerHTML = '';

    sites.forEach(site => {
        const item = document.createElement('div');
        item.className = 'recent-item';
        item.title = site.url || '';

        const host = hostFromUrl(site.url || '');
        item.innerHTML = `
            <img class="recent-favicon" src="https://www.google.com/s2/favicons?domain=${host}&sz=32" alt="">
            <span class="recent-url">${host}</span>
            <span class="recent-title">${(site.title || host).slice(0, 40)}</span>`;
        item.addEventListener('click', () => go(site.url));
        grid.appendChild(item);
    });
}

// ── Data sync (sent by parent shell) ─────────────────────────────────────────
window.addEventListener('message', e => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'theme') {
        applyTheme(e.data.theme);
    }
    if (e.data.type === 'suggestion-results') {
        currentSuggestions = e.data.results || [];
        selectedSuggestionIndex = -1;
        renderSuggestions();
    }
    if (e.data.type === 'recent-sites') {
        renderSiteList('recents-section', 'recents-grid', e.data.sites || []);
        return;
    }

    if (e.data.type === 'bookmarks-data') {
        renderSiteList('bookmarks-section', 'bookmarks-grid', e.data.bookmarks || []);
    }
});

window.addEventListener('storage', e => {
    if (e.key === 'zenith-theme') {
        applyTheme(e.newValue || 'dark');
    }
});

// Tell host shell we're ready.
sendToHost({ type: 'home-ready' });
</script>
</body>
</html>
