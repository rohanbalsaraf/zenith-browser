<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --text: #f2f4fa;
            --muted: #8a92aa;
            --accent-soft: rgba(63,136,255,0.15);
            --hover: rgba(255,255,255,0.06);
            --ok: #34d399;
            --warn: #f59e0b;
            --fail: #ef4444;
        }

        [data-theme="light"] {
            --bg: #f4f6fb;
            --panel: rgba(255,255,255,0.84);
            --panel-border: rgba(15,23,42,0.12);
            --text: #121827;
            --muted: #5e677d;
            --accent-soft: rgba(47,109,247,0.14);
            --hover: rgba(15,23,42,0.06);
            --ok: #10b981;
            --warn: #d97706;
            --fail: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(900px 360px at 15% -10%, var(--accent-soft), transparent 60%), var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 22px;
            gap: 14px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .btn {
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            background: var(--panel);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 10px;
            cursor: pointer;
            transition: background 0.12s ease;
        }

        .btn:hover {
            background: var(--hover);
        }

        .list {
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            background: var(--panel);
            overflow: auto;
            min-height: 0;
            padding: 6px;
        }

        .empty {
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            padding: 24px 8px;
        }

        .entry {
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
        }

        .entry:hover {
            background: var(--hover);
        }

        .entry-main {
            min-width: 0;
        }

        .entry-url {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .entry-path {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .badge.in-progress {
            color: var(--warn);
            border-color: rgba(245, 158, 11, 0.35);
        }

        .badge.completed {
            color: var(--ok);
            border-color: rgba(16, 185, 129, 0.35);
        }

        .badge.failed {
            color: var(--fail);
            border-color: rgba(239, 68, 68, 0.35);
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div class="title">Downloads</div>
        <button id="clear-btn" class="btn">Clear</button>
    </div>

    <div id="downloads-list" class="list">
        <div class="empty">No downloads yet</div>
    </div>
</div>

<script>
let entries = [];

function applyTheme(theme) {
    const normalized = theme === 'light' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', normalized);
}

function initialTheme() {
    const saved = localStorage.getItem('zenith-theme');
    if (saved === 'light' || saved === 'dark') return saved;
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ? 'dark'
        : 'light';
}

function send(payload) {
    const message = { ...payload };
    if (typeof window.__ZENITH_TAB_ID === 'number') {
        message.tabId = window.__ZENITH_TAB_ID;
    }
    try {
        if (window.ipc && typeof window.ipc.postMessage === 'function') {
            window.ipc.postMessage(JSON.stringify(message));
            return;
        }
    } catch (_) {}
    window.parent.postMessage(message, '*');
}

function statusLabel(raw) {
    if (raw === 'completed') return 'Completed';
    if (raw === 'failed') return 'Failed';
    return 'In Progress';
}

function statusClass(raw) {
    if (raw === 'completed') return 'completed';
    if (raw === 'failed') return 'failed';
    return 'in-progress';
}

function render() {
    const list = document.getElementById('downloads-list');
    if (!entries.length) {
        list.innerHTML = '<div class="empty">No downloads yet</div>';
        return;
    }

    list.innerHTML = '';
    entries.forEach((entry) => {
        const row = document.createElement('div');
        row.className = 'entry';
        const status = statusClass(entry.status || 'in_progress');
        row.innerHTML = `
            <div class="entry-main">
                <div class="entry-url">${entry.url || ''}</div>
                <div class="entry-path">${entry.path || '(No destination path reported)'}</div>
            </div>
            <span class="badge ${status}">${statusLabel(entry.status)}</span>`;
        list.appendChild(row);
    });
}

document.getElementById('clear-btn').addEventListener('click', () => {
    send({ type: 'clear_downloads' });
});

window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;

    if (e.data.type === 'theme') {
        applyTheme(e.data.theme);
        return;
    }

    if (e.data.type === 'downloads-data') {
        entries = Array.isArray(e.data.entries) ? e.data.entries : [];
        render();
    }
});

window.addEventListener('storage', (e) => {
    if (e.key === 'zenith-theme') {
        applyTheme(e.newValue || 'dark');
    }
});

applyTheme(initialTheme());
send({ type: 'downloads-ready' });
</script>
</body>
</html>
