<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith UI</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ui.css">
</head>
<body>
    <div class="tabs-bar" id="tabs-bar">
        <!-- Tabs will be injected here -->
        <button id="new-tab-btn" class="icon-btn" title="New Tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>
    <div class="toolbar">
        <div class="nav-buttons">
            <button id="back-btn" title="Back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="forward-btn" title="Forward">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
            <button id="reload-btn" title="Reload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </button>
        </div>
        
        <div class="address-bar-container">
            <input type="text" id="url-input" placeholder="Search or enter URL" spellcheck="false" autocomplete="off">
        </div>

        <button id="settings-btn" class="icon-btn" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>

        <div class="status-indicator" id="status-dot"></div>
    </div>

    <!-- Settings Menu Popover -->
    <div id="settings-menu" class="settings-menu hidden">
        <div class="menu-header">Settings</div>
        <div class="menu-item" id="new-window-btn">New Window</div>
        <div class="menu-item" id="clear-history-btn">Clear History</div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="about-btn">About Zenith</div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const backBtn = document.getElementById('back-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const reloadBtn = document.getElementById('reload-btn');
        const newTabBtn = document.getElementById('new-tab-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsMenu = document.getElementById('settings-menu');
        const tabsBar = document.getElementById('tabs-bar');

        let tabs = [];
        let activeTabId = null;

        function sendMsg(type, payload) {
            window.ipc.postMessage(JSON.stringify({ type, payload }));
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
            const cmdKey = isMac ? e.metaKey : e.ctrlKey;
            
            if (cmdKey && e.key === 't') {
                e.preventDefault();
                sendMsg('new_tab');
            } else if (cmdKey && e.key === 'w') {
                e.preventDefault();
                if (activeTabId !== null) sendMsg('close_tab', activeTabId);
            }
        });

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let url = urlInput.value.trim();
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    if (url.includes('.') && !url.includes(' ')) {
                        url = 'https://' + url;
                    } else {
                        url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                    }
                }
                sendMsg('load_url', url);
                urlInput.blur();
            }
        });

        backBtn.addEventListener('click', () => sendMsg('back'));
        forwardBtn.addEventListener('click', () => sendMsg('forward'));
        reloadBtn.addEventListener('click', () => sendMsg('reload'));
        newTabBtn.addEventListener('click', () => sendMsg('new_tab'));

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', (e) => {
            if (!settingsMenu.contains(e.target) && e.target !== settingsBtn) {
                settingsMenu.classList.add('hidden');
            }
        });

        document.getElementById('new-window-btn').addEventListener('click', () => sendMsg('new_window'));
        document.getElementById('clear-history-btn').addEventListener('click', () => {
            alert("History cleared!"); // Placeholder
            settingsMenu.classList.add('hidden');
        });
        document.getElementById('about-btn').addEventListener('click', () => {
            alert("Zenith Browser v0.1.0\nModern. Minimal. Rapid.");
            settingsMenu.classList.add('hidden');
        });

        function createTabElement(tab) {
            const div = document.createElement('div');
            div.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
            div.id = `tab-${tab.id}`;
            
            const title = document.createElement('span');
            title.className = 'tab-title';
            title.innerText = tab.title || 'New Tab';
            
            const closeBtn = document.createElement('button');
            closeBtn.className = 'tab-close';
            closeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
            
            div.addEventListener('click', (e) => {
                if (e.target.closest('.tab-close')) return;
                sendMsg('switch_tab', tab.id);
            });
            
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                sendMsg('close_tab', tab.id);
            });
            
            div.appendChild(title);
            div.appendChild(closeBtn);
            return div;
        }

        function renderTabs() {
            // Keep the new tab button
            const newBtn = document.getElementById('new-tab-btn');
            tabsBar.innerHTML = '';
            
            tabs.forEach(tab => {
                tabsBar.appendChild(createTabElement(tab));
            });
            
            tabsBar.appendChild(newBtn);
        }

        // Listen for updates from Rust
        window.addEventListener('message', (event) => {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === 'update_url') {
                    urlInput.value = msg.payload;
                    const activeTab = tabs.find(t => t.id === activeTabId);
                    if (activeTab) activeTab.url = msg.payload;
                } else if (msg.type === 'update_tabs') {
                    tabs = msg.payload.tabs;
                    activeTabId = msg.payload.active_id;
                    renderTabs();
                    
                    // Update URL bar for active tab
                    const activeTab = tabs.find(t => t.id === activeTabId);
                    if (activeTab) urlInput.value = activeTab.url || '';
                } else if (msg.type === 'loading') {
                    document.getElementById('status-dot').classList.add('loading');
                } else if (msg.type === 'done') {
                    document.getElementById('status-dot').classList.remove('loading');
                }
            } catch (e) {
                console.error("Failed to parse message from Rust:", e);
            }
        });
    </script>
</body>
</html>
