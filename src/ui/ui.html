<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith UI</title>
    <link rel="stylesheet" href="ui.css">
</head>
<body>
    <div class="toolbar">
        <div class="nav-buttons">
            <button id="back-btn" title="Back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button id="forward-btn" title="Forward">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
            <button id="reload-btn" title="Reload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
            </button>
        </div>
        <div class="address-bar-container">
            <input type="text" id="url-input" placeholder="Enter URL or search..." spellcheck="false">
        </div>
        <div class="status-indicator" id="status-dot"></div>
    </div>

    <script>
        const urlInput = document.getElementById('url-input');
        const backBtn = document.getElementById('back-btn');
        const forwardBtn = document.getElementById('forward-btn');
        const reloadBtn = document.getElementById('reload-btn');

        function sendMsg(type, payload) {
            window.ipc.postMessage(JSON.stringify({ type, payload }));
        }

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                let url = urlInput.value.trim();
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    if (url.includes('.') && !url.includes(' ')) {
                        url = 'https://' + url;
                    } else {
                        url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                    }
                }
                sendMsg('load_url', url);
            }
        });

        backBtn.addEventListener('click', () => sendMsg('back'));
        forwardBtn.addEventListener('click', () => sendMsg('forward'));
        reloadBtn.addEventListener('click', () => sendMsg('reload'));

        // Listen for updates from Rust
        window.addEventListener('message', (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'update_url') {
                urlInput.value = msg.payload;
            } else if (msg.type === 'loading') {
                document.getElementById('status-dot').classList.add('loading');
            } else if (msg.type === 'done') {
                document.getElementById('status-dot').classList.remove('loading');
            }
        });
    </script>
</body>
</html>
