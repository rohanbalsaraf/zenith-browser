<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zenith</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ui.css">
</head>
<body>
<div id="ui-shell">
    <div class="tabs-bar" id="tabs-bar">
        <button id="new-tab-btn" class="icon-btn" title="New Tab (⌘T)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
    </div>
    <div class="toolbar">
        <div class="nav-buttons">
            <button id="back-btn" class="nav-btn" title="Back (⌘[)" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <button id="forward-btn" class="nav-btn" title="Forward (⌘])" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
            <button id="reload-btn" class="nav-btn" title="Reload (⌘R)">
                <svg id="icon-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
            </button>
        </div>
        <div class="address-bar-wrap" id="address-bar-wrap">
            <svg id="search-icon" class="addr-icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="url-input" placeholder="Search or enter URL" spellcheck="false" autocomplete="off" autofocus>
        </div>
        <button id="settings-btn" class="icon-btn" title="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
    </div>
</div>

<div id="tabs-content"></div>

<div id="settings-menu" class="settings-menu hidden">
    <div class="menu-section-label">Navigation</div>
    <div class="menu-item" id="m-new-tab"><span class="menu-item-icon">＋</span>New Tab<span class="menu-kbd">⌘T</span></div>
    <div class="menu-item" id="m-close-tab"><span class="menu-item-icon">✕</span>Close Tab<span class="menu-kbd">⌘W</span></div>
    <div class="menu-divider"></div>
    <div class="menu-section-label">Appearance</div>
    <div class="menu-item" id="m-theme"><span class="menu-item-icon">◑</span><span id="theme-label">Light Mode</span></div>
</div>

<script>
const tabsBar   = document.getElementById('tabs-bar');
const tabsCont  = document.getElementById('tabs-content');
const urlInput  = document.getElementById('url-input');
const newTabBtn = document.getElementById('new-tab-btn');
const settBtn   = document.getElementById('settings-btn');
const settMenu  = document.getElementById('settings-menu');
const backBtn   = document.getElementById('back-btn');
const fwdBtn    = document.getElementById('forward-btn');
const reloadBtn = document.getElementById('reload-btn');

let tabs     = [];
let activeId = null;
let nextId   = 0;
let darkMode = localStorage.getItem('zenith-theme') !== 'light';

function fromProxyUrl(rawUrl) {
    try {
        const u = new URL(rawUrl);
        if (u.protocol !== 'zenith:') return rawUrl;
        const parts = u.hostname.split('.');
        if (parts.length < 4 || parts[parts.length - 1] !== 'z') return rawUrl;
        const scheme = parts[0];
        if (scheme !== 'http' && scheme !== 'https') return rawUrl;
        const port = parts[parts.length - 2];
        const host = parts.slice(1, -2).join('.');
        if (!host) return rawUrl;
        const defaultPort = scheme === 'https' ? '443' : '80';
        const portPart = port !== defaultPort ? `:${port}` : '';
        return `${scheme}://${host}${portPart}${u.pathname || '/'}${u.search || ''}${u.hash || ''}`;
    } catch (_) {
        return rawUrl;
    }
}

function toProxyUrl(rawUrl) {
    try {
        const u = new URL(rawUrl);
        if (!['http:', 'https:'].includes(u.protocol)) return rawUrl;
        const port = u.port || (u.protocol === 'https:' ? '443' : '80');
        return `zenith://${u.protocol.slice(0, -1)}.${u.hostname}.${port}.z${u.pathname || '/'}${u.search || ''}${u.hash || ''}`;
    } catch (_) {
        return rawUrl;
    }
}

function updateNavButtons() {
    const hasFrame = !!document.getElementById(`frame-${activeId}`);
    backBtn.disabled = !hasFrame;
    fwdBtn.disabled = !hasFrame;
}

// ── Rust Router Bridges ──────────────────────────────────────────────────────
window.zenithUpdateAddressBar = (u) => {
    u = fromProxyUrl(u);
    const f = document.getElementById(`frame-${activeId}`);
    if (f) {
        f.dataset.realUrl = u;
        if (document.activeElement !== urlInput) {
            urlInput.value = (u.includes('zenith://assets/home')) ? '' : u;
        }
    }
};

window.zenithNewTab = () => createTab();
window.zenithNavigate = (url) => navigate(activeId, url);

// ── Theme ───────────────────────────────────────────────────────────────────
function applyTheme() {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    document.getElementById('theme-label').textContent = darkMode ? 'Light Mode' : 'Dark Mode';
    localStorage.setItem('zenith-theme', darkMode ? 'dark' : 'light');
}
applyTheme();

// ── Tab Management ──────────────────────────────────────────────────────────
function createTab(url = 'zenith://assets/home') {
    const id = nextId++;
    const tab = { id, title: 'New Tab', url };
    tabs.push(tab);

    const pill = document.createElement('div');
    pill.id = `tab-${id}`;
    pill.className = 'tab';
    pill.innerHTML = `<span class="tab-lbl" id="lbl-${id}">New Tab</span><button class="tab-x">×</button>`;
    pill.onclick = (e) => {
        if (e.target.closest('.tab-x')) closeTab(id); else switchTab(id);
    };
    tabsBar.insertBefore(pill, newTabBtn);

    const frame = document.createElement('iframe');
    frame.id = `frame-${id}`;
    frame.className = 'tab-frame hidden';
    frame.src = url;
    
    frame.onload = () => {
        try {
            const title = frame.contentDocument ? frame.contentDocument.title : "Zenith";
            const lbl = document.getElementById(`lbl-${id}`);
            if (lbl) lbl.innerText = title || "Zenith";
            if (id === activeId && document.activeElement !== urlInput) {
                const realUrl = frame.dataset.realUrl || url;
                urlInput.value = (realUrl.includes('zenith://assets/home')) ? '' : realUrl;
            }
        } catch(e) {}
    };
    tabsCont.appendChild(frame);
    switchTab(id);
    navigate(id, url);
}

function switchTab(id) {
    tabs.forEach(t => {
        const f = document.getElementById(`frame-${t.id}`);
        const p = document.getElementById(`tab-${t.id}`);
        if (f) f.classList.toggle('hidden', t.id !== id);
        if (p) p.classList.toggle('active', t.id === id);
    });
    activeId = id;
    const tab = tabs.find(t => t.id === id);
    if (tab && document.activeElement !== urlInput) {
        const f = document.getElementById(`frame-${id}`);
        const u = f.dataset.realUrl || tab.url;
        urlInput.value = (u.includes('zenith://assets/home')) ? '' : u;
    }
    updateNavButtons();
}

function closeTab(id) {
    if (tabs.length <= 1) return;
    tabs = tabs.filter(t => t.id !== id);
    const p = document.getElementById(`tab-${id}`); if (p) p.remove();
    const f = document.getElementById(`frame-${id}`); if (f) f.remove();
    if (activeId === id) switchTab(tabs[0].id);
    updateNavButtons();
}

function navigate(id, rawUrl) {
    let url = rawUrl.trim();
    if (!url) return;
    if (!url.startsWith('http') && !url.startsWith('zenith://')) {
        url = (url.includes('.') && !url.includes(' ')) ? 'https://' + url : 'https://www.google.com/search?q=' + encodeURIComponent(url);
    }
    const frame = document.getElementById(`frame-${id}`);
    if (frame) {
        frame.dataset.realUrl = url;
        frame.src = (url.startsWith('http') && !url.includes('zenith://')) ? toProxyUrl(url) : url;
    }
    updateNavButtons();
}

// ── Events ──────────────────────────────────────────────────────────────────
urlInput.onkeydown = (e) => {
    if (e.key === 'Enter') { navigate(activeId, urlInput.value); urlInput.blur(); }
};
urlInput.onfocus = () => setTimeout(() => urlInput.select(), 10);

newTabBtn.onclick = () => createTab();
settBtn.onclick = (e) => { e.stopPropagation(); settMenu.classList.toggle('hidden'); };
document.onclick = () => settMenu.classList.add('hidden');

document.getElementById('m-new-tab').onclick = () => createTab();
document.getElementById('m-close-tab').onclick = () => closeTab(activeId);
document.getElementById('m-theme').onclick = () => { darkMode = !darkMode; applyTheme(); };

backBtn.onclick = () => { try { document.getElementById(`frame-${activeId}`).contentWindow.history.back(); } catch(e) {} };
fwdBtn.onclick = () => { try { document.getElementById(`frame-${activeId}`).contentWindow.history.forward(); } catch(e) {} };
reloadBtn.onclick = () => { const f = document.getElementById(`frame-${activeId}`); if (f) f.src = f.src; };

// ── Window Listeners (from home.html) ───────────────────────────────────────
window.addEventListener('message', e => {
    const activeFrame = document.getElementById(`frame-${activeId}`);
    if (!activeFrame || e.source !== activeFrame.contentWindow) return;
    if (e.data.type === 'navigate') navigate(activeId, e.data.url);
});

// Boot
createTab();
</script>
</body>
</html>
