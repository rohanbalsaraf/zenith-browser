<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root, [data-theme="dark"], [data-theme="zenith-dark"] {
            --bg: #0f1117;
            --panel: rgba(255,255,255,0.04);
            --panel-border: rgba(255,255,255,0.08);
            --text: #f2f4fa;
            --muted: #8a92aa;
            --accent: #3f88ff;
            --accent-soft: rgba(63,136,255,0.15);
            --hover: rgba(255,255,255,0.06);
        }

        [data-theme="light"], [data-theme="zenith-light"] {
            --bg: #f4f6fb;
            --panel: rgba(255,255,255,0.84);
            --panel-border: rgba(15,23,42,0.12);
            --text: #121827;
            --muted: #5e677d;
            --accent: #2f6df7;
            --accent-soft: rgba(47,109,247,0.14);
            --hover: rgba(15,23,42,0.06);
        }

        [data-theme="catppuccin-mocha"] {
            --bg: #1e1e2e;
            --panel: #181825;
            --panel-border: #313244;
            --text: #cdd6f4;
            --muted: #bac2de;
            --accent: #89b4fa;
            --accent-soft: rgba(137, 180, 250, 0.15);
            --hover: rgba(205, 214, 244, 0.1);
        }

        [data-theme="gruvbox-dark"] {
            --bg: #282828;
            --panel: #1d2021;
            --panel-border: #3c3836;
            --text: #ebdbb2;
            --muted: #a89984;
            --accent: #fabd2f;
            --accent-soft: rgba(250, 189, 47, 0.15);
            --hover: rgba(235, 219, 178, 0.1);
        }

        [data-theme="github-dark"] {
            --bg: #0d1117;
            --panel: #161b22;
            --panel-border: #30363d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #58a6ff;
            --accent-soft: rgba(88, 166, 255, 0.15);
            --hover: rgba(201, 209, 217, 0.1);
        }

        [data-theme="github-light"] {
            --bg: #ffffff;
            --panel: #f6f8fa;
            --panel-border: #d0d7de;
            --text: #24292f;
            --muted: #57606a;
            --accent: #0969da;
            --accent-soft: rgba(9, 105, 218, 0.1);
            --hover: rgba(36, 41, 47, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(900px 360px at 15% -10%, var(--accent-soft), transparent 60%), var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 22px;
            gap: 14px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .top-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            background: var(--panel);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 10px;
            cursor: pointer;
            transition: background 0.12s ease;
        }

        .btn:hover {
            background: var(--hover);
        }

        .search {
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            background: var(--panel);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search input {
            flex: 1;
            border: 0;
            background: transparent;
            color: var(--text);
            outline: none;
            font-size: 13px;
        }

        .search input::placeholder {
            color: var(--muted);
        }

        .list {
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            background: var(--panel);
            overflow: auto;
            min-height: 0;
            padding: 6px;
        }

        .empty {
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            padding: 24px 8px;
        }

        .entry {
            border-radius: 10px;
            display: grid;
            grid-template-columns: 20px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 9px 10px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .entry:hover {
            background: var(--hover);
        }

        .fav {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .entry-main {
            min-width: 0;
        }

        .entry-title {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .entry-url {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-action {
            color: var(--muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div class="title">History</div>
        <div class="top-actions">
            <button id="clear-btn" class="btn">Clear</button>
        </div>
    </div>

    <div class="search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="filter-input" type="text" placeholder="Search history by title or URL">
    </div>

    <div id="history-list" class="list">
        <div class="empty">No history yet</div>
    </div>
</div>

<script>
let historyEntries = [];

function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
}

function initialTheme() {
    return localStorage.getItem('zenith-theme') || 'zenith-dark';
}

function send(payload) {
    const message = { ...payload };
    if (typeof window.__ZENITH_TAB_ID === 'number') {
        message.tabId = window.__ZENITH_TAB_ID;
    }
    try {
        if (window.ipc && typeof window.ipc.postMessage === 'function') {
            window.ipc.postMessage(JSON.stringify(message));
            return;
        }
    } catch (_) {}
    window.parent.postMessage(message, '*');
}

function hostFromUrl(url) {
    try {
        return new URL(url).hostname;
    } catch (_) {
        return url || '';
    }
}

function renderHistory(filterText = '') {
    const list = document.getElementById('history-list');
    const normalized = filterText.trim().toLowerCase();
    const filtered = historyEntries.filter((entry) => {
        if (!normalized) return true;
        const haystack = `${entry.title || ''} ${entry.url || ''}`.toLowerCase();
        return haystack.includes(normalized);
    });

    if (!filtered.length) {
        list.innerHTML = '<div class="empty">No matching history items</div>';
        return;
    }

    list.innerHTML = '';
    filtered.forEach((entry) => {
        const url = entry.url || '';
        const host = hostFromUrl(url);
        const title = (entry.title || host || url || 'Untitled').slice(0, 140);

        const row = document.createElement('a');
        row.className = 'entry';
        row.href = '#';
        row.title = url;
        row.innerHTML = `
            <img class="fav" src="https://www.google.com/s2/favicons?domain=${host}&sz=32" alt="">
            <div class="entry-main">
                <div class="entry-title">${title}</div>
                <div class="entry-url">${url}</div>
            </div>
            <div class="entry-action">Open</div>`;
        row.addEventListener('click', (e) => {
            e.preventDefault();
            send({ type: 'navigate', url });
        });
        list.appendChild(row);
    });
}

document.getElementById('filter-input').addEventListener('input', (e) => {
    renderHistory(e.target.value || '');
});

document.getElementById('clear-btn').addEventListener('click', () => {
    send({ type: 'clear_history' });
});

window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;

    if (e.data.type === 'theme') {
        applyTheme(e.data.theme);
        return;
    }

    if (e.data.type === 'history-data') {
        historyEntries = Array.isArray(e.data.entries) ? e.data.entries : [];
        const filterValue = document.getElementById('filter-input').value || '';
        renderHistory(filterValue);
    }
});

window.addEventListener('storage', (e) => {
    if (e.key === 'zenith-theme') {
        applyTheme(e.newValue || 'dark');
    }
});

applyTheme(initialTheme());
send({ type: 'history-ready' });
</script>
</body>
</html>
